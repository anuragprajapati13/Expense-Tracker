<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ExpenseTracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/navbar-interactive.css">
    <link rel="stylesheet" href="/static/css/light-theme.css">
    <link rel="stylesheet" href="/static/css/3d-enhanced.css">
    <link rel="stylesheet" href="/static/css/settings.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.1));
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 4px solid #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .profile-email {
            font-size: 16px;
            color: #d1d5db;
            margin-bottom: 5px;
        }

        .profile-info {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #8b5cf6;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-value {
            font-weight: 500;
            color: #1f2937;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #8b5cf6;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .action-buttons a,
        .action-buttons button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        body.light-theme .profile-container {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(102, 126, 234, 0.05));
            border-color: rgba(102, 126, 234, 0.15);
        }

        body.light-theme .profile-name {
            color: #1f2937;
        }

        body.light-theme .profile-email {
            color: #6b7280;
        }

        body.light-theme .info-label {
            color: #6b7280;
        }

        body.light-theme .profile-info {
            background: #f8f9fa;
            border-left-color: #667eea;
        }

        body.light-theme .info-value {
            color: #1f2937;
        }

        body.light-theme .stat-number {
            color: #667eea;
        }

        body.light-theme .stat-card {
            background: #f8f9fa;
            border-color: #e9ecef;
        }

        /* Dark mode text visibility */
        .stat-label {
            color: #9ca3af !important;
        }

        body.light-theme .stat-label {
            color: #6b7280 !important;
        }
    </style>
</head>
<body>
    {% include 'components/navbar-interactive.html' %}

    <div class="container">
        <div class="profile-container">
            <!-- Profile Header -->
            <div class="profile-header">
                <img class="profile-avatar" 
                     src="https://ui-avatars.com/api/?name={{ user.name }}&background=8B5CF6&color=fff&bold=true" 
                     alt="User Avatar">
                <h1 class="profile-name">{{ user.name }}</h1>
                <p class="profile-email">{{ user.email }}</p>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">{{ total_transactions }}</div>
                    <div class="stat-label">Total Transactions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">₹{{ user.budget | default(0) | int }}</div>
                    <div class="stat-label">Monthly Budget</div>
                </div>
            </div>

            <!-- Profile Info -->
            <div class="profile-info">
                <div class="info-row">
                    <span class="info-label">
                        <i class="fas fa-envelope"></i> Email
                    </span>
                    <span class="info-value">{{ user.email }}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">
                        <i class="fas fa-calendar-alt"></i> Member Since
                    </span>
                    <span class="info-value">2024</span>
                </div>
                <div class="info-row">
                    <span class="info-label">
                        <i class="fas fa-shield-alt"></i> Account Status
                    </span>
                    <span class="info-value">
                        <span style="color: #10b981;"><i class="fas fa-check-circle"></i> Active</span>
                    </span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="/account-settings" class="btn-success">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <a href="/dashboard" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>
        </div>
    </div>

    <script src="/static/js/navbar-interactive.js"></script>
    <script src="/static/js/theme.js"></script>
<script src="/static/js/3d-interactive.js"></script>
</body>
</html>
