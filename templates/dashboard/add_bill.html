<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Bill</title>
    <link rel="stylesheet" href="/static/css/dashboard-new.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/3d-enhanced.css">
</head>
<body>
<div class="main-container">
    <div class="main-wrapper">
        <div class="content">
            <div class="glass-card card-3d depth-shadow-glow animation-stagger-2" style="max-width: 480px; margin: 60px auto 0 auto; position: relative;">
                <a href="/dashboard" title="Go to Dashboard" style="position: absolute; top: 22px; right: 28px; color: #a78bfa; background: rgba(139,92,246,0.08); border-radius: 8px; padding: 7px 13px; font-size: 1.1em; font-weight: 600; text-decoration: none; box-shadow: 0 2px 8px #a78bfa22; transition: background 0.2s; z-index: 2;">
                    <i class="fas fa-home" style="margin-right: 6px;"></i>Dashboard
                </a>
                <div class="card-header" style="display: flex; align-items: center; gap: 12px;">
                    <span class="header-illustration" style="font-size: 2.2rem; animation: float3D 4s infinite;">🧾</span>
                    <h2 style="margin: 0; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Add New Bill</h2>
                </div>
                <div class="card-body" style="width: 100%;">
                    {% if message %}
                        <div class="alert alert-success" style="margin-bottom: 18px;">{{ message }}</div>
                    {% endif %}
                    {% if error %}
                        <div class="alert alert-error" style="margin-bottom: 18px;">{{ error }}</div>
                    {% endif %}
                    <form method="POST" style="display: flex; flex-direction: column; gap: 18px;">
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                            <label for="name" style="font-weight: 600; color: #a78bfa;">Bill Name</label>
                            <input type="text" id="name" name="name" required class="input-3d" style="padding: 12px 14px; border-radius: 10px; border: 1.5px solid #a78bfa33; background: rgba(30,41,59,0.7); color: #fff; font-size: 15px;">
                        </div>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                            <label for="amount" style="font-weight: 600; color: #a78bfa;">Amount (₹)</label>
                            <input type="number" id="amount" name="amount" step="0.01" required class="input-3d" style="padding: 12px 14px; border-radius: 10px; border: 1.5px solid #a78bfa33; background: rgba(30,41,59,0.7); color: #fff; font-size: 15px;">
                        </div>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                            <label for="due_date" style="font-weight: 600; color: #a78bfa;">Due Date</label>
                            <input type="date" id="due_date" name="due_date" required class="input-3d" style="padding: 12px 14px; border-radius: 10px; border: 1.5px solid #a78bfa33; background: rgba(30,41,59,0.7); color: #fff; font-size: 15px;">
                        </div>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                            <label for="status" style="font-weight: 600; color: #a78bfa;">Status</label>
                            <select id="status" name="status" class="input-3d" style="padding: 12px 14px; border-radius: 10px; border: 1.5px solid #a78bfa33; background: rgba(30,41,59,0.7); color: #fff; font-size: 15px;">
                                <option value="Pending">Pending</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                            <label for="icon" style="font-weight: 600; color: #a78bfa;">Bill Icon <span style="font-weight:400; color:#cbd5e1; font-size:13px;">(type or pick below)</span></label>
                            <input type="text" id="icon" name="icon" placeholder="Type icon, e.g. fa-home" class="input-3d" style="padding: 12px 14px; border-radius: 10px; border: 1.5px solid #a78bfa33; background: rgba(30,41,59,0.7); color: #fff; font-size: 15px;">
                            <div style="display: flex; gap: 10px; margin-top: 6px;">
                                <span title="Home"><i class="fas fa-home" style="color:#a78bfa; font-size:1.3em; cursor:pointer;" onclick="document.getElementById('icon').value='fa-home'"></i></span>
                                <span title="Electricity"><i class="fas fa-bolt" style="color:#fbbf24; font-size:1.3em; cursor:pointer;" onclick="document.getElementById('icon').value='fa-bolt'"></i></span>
                                <span title="Bill"><i class="fas fa-file-invoice" style="color:#38bdf8; font-size:1.3em; cursor:pointer;" onclick="document.getElementById('icon').value='fa-file-invoice'"></i></span>
                                <span title="Shopping"><i class="fas fa-shopping-bag" style="color:#ec4899; font-size:1.3em; cursor:pointer;" onclick="document.getElementById('icon').value='fa-shopping-bag'"></i></span>
                                <span title="Wifi"><i class="fas fa-wifi" style="color:#06b6d4; font-size:1.3em; cursor:pointer;" onclick="document.getElementById('icon').value='fa-wifi'"></i></span>
                                <span title="Car"><i class="fas fa-car" style="color:#10b981; font-size:1.3em; cursor:pointer;" onclick="document.getElementById('icon').value='fa-car'"></i></span>
                            </div>
                        </div>
                        <button type="submit" class="button-3d" style="margin-top: 8px; padding: 13px; background: linear-gradient(135deg, #a78bfa 0%, #8B5CF6 100%); border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 10px 30px #8B5CF666; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.3s;">
                            <i class="fas fa-plus-circle"></i> Add Bill
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
