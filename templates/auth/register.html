<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ExpenseTracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/3d-enhanced.css') }}">
</head>
<body>

<div class="container">
    <div class="login-box register-box">
        <div class="auth-header">
            <h1 class="auth-title">💰 ExpenseTracker</h1>
            <p class="auth-subtitle">Create Your Account</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        {% if success %}
        <div class="success-message">
            <i class="fas fa-check-circle"></i>
            <span>{{ success }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password
                    <span class="password-info-icon" tabindex="0">
                        <i class="fas fa-info-circle"></i>
                        <span class="password-tooltip">
                            Password must be at least 6 characters, contain a lowercase letter, an uppercase letter, and a number.
                        </span>
                    </span>
                </label>
                <div class="password-input-group">
                    <input type="password" id="password" name="password" placeholder="Min 6 characters" required autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-requirements" id="passwordRequirements">
                    <span id="pw-length" class="pw-req"><i class="fas fa-times"></i> At least 6 characters</span>
                    <span id="pw-lower" class="pw-req"><i class="fas fa-times"></i> Lowercase letter</span>
                    <span id="pw-upper" class="pw-req"><i class="fas fa-times"></i> Uppercase letter</span>
                    <span id="pw-num" class="pw-req"><i class="fas fa-times"></i> Number</span>
                </div>
            </div>

            <div class="password-requirements">
                <p><i class="fas fa-check"></i> At least 6 characters</p>
                <p><i class="fas fa-lock"></i> Keep it secure</p>
            </div>

            <button type="submit" class="submit-btn">
                <span>Create Account</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/">Login here</a></p>
        </div>
    </div>

    <!-- Animated background elements -->
    <div class="bg-element bg-element-1"></div>
    <div class="bg-element bg-element-2"></div>
    <div class="bg-element bg-element-3"></div>
</div>

<script src="{{ url_for('static', filename='js/3d-interactive.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
