<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ExpenseTracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/3d-enhanced.css') }}">
</head>
<body>
<div class="container">
    <div class="login-box">
        <div class="auth-header">
            <h1 class="auth-title">💰 ExpenseTracker</h1>
            <p class="auth-subtitle">Forgot Password</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flashes">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required autofocus>
            </div>
            <button type="submit" class="submit-btn">Send OTP</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('otp.login') }}" class="back-link">Back to Login</a>
        </div>
    </div>
    <div class="bg-element bg-element-1"></div>
    <div class="bg-element bg-element-2"></div>
    <div class="bg-element bg-element-3"></div>
</div>
<script src="{{ url_for('static', filename='js/3d-interactive.js') }}"></script>
</body>
</html>
