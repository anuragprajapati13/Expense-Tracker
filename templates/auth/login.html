<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExpenseTracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="/static/css/3d-enhanced.css">
</head>
<body>

<div class="container">
    <!-- 3D Floating Coins -->
    <div class="floating-coin coin-1"><i class="fas fa-coins"></i></div>
    <div class="floating-coin coin-2"><i class="fas fa-coins"></i></div>
    <div class="floating-coin coin-3"><i class="fas fa-piggy-bank"></i></div>
    <div class="login-box card-3d depth-shadow-glow interactive-3d glass-3d animation-stagger-2">
        <div class="auth-header">
            <h1 class="auth-title text-3d-glow animation-stagger-1">💰 ExpenseTracker</h1>
            <p class="auth-subtitle animation-stagger-2">Welcome Back</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" class="auth-form animation-stagger-3">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required class="input-3d">
            </div>

            <div class="form-group">
                <label for="password">Password
                    <span class="password-info-icon" tabindex="0">
                        <i class="fas fa-info-circle"></i>
                        <span class="password-tooltip">
                            Password must be at least 6 characters, contain a lowercase letter, an uppercase letter, and a number.
                        </span>
                    </span>
                </label>
                <div class="password-input-group">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" class="input-3d">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-requirements" id="passwordRequirements">
                    <span id="pw-length" class="pw-req"><i class="fas fa-times"></i> At least 6 characters</span>
                    <span id="pw-lower" class="pw-req"><i class="fas fa-times"></i> Lowercase letter</span>
                    <span id="pw-upper" class="pw-req"><i class="fas fa-times"></i> Uppercase letter</span>
                    <span id="pw-num" class="pw-req"><i class="fas fa-times"></i> Number</span>
                </div>
            </div>

            <button type="submit" class="submit-btn button-3d animation-stagger-4">
                <span>Login</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p>New user? <a href="/register">Create account</a></p>
            <p><a href="/forgot-password" class="forgot-password">Forgot password?</a></p>
        </div>
    </div>

    <!-- Animated background elements -->
    <div class="bg-element bg-element-1"></div>
    <div class="bg-element bg-element-2"></div>
    <div class="bg-element bg-element-3"></div>
</div>

<script src="/static/js/3d-interactive.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
