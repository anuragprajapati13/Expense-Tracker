<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ExpenseTracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="/static/css/3d-enhanced.css">
</head>
<body>

<div class="container">
    <div class="login-box">
        <div class="auth-header">
            <h1 class="auth-title">💰 ExpenseTracker</h1>
            <p class="auth-subtitle">Reset Password</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flashes">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="password-input-group">
                    <input type="password" id="password" name="password" placeholder="New Password" required>
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="password-input-group">
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirm_password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="submit-btn">Reset Password</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('login') }}" class="back-link">Back to Login</a>
        </div>
    </div>

    <!-- Animated background elements -->
    <div class="bg-element bg-element-1"></div>
    <div class="bg-element bg-element-2"></div>
    <div class="bg-element bg-element-3"></div>
</div>

<script src="/static/js/3d-interactive.js"></script>
<script>
function togglePasswordVisibility(id) {
  const input = document.getElementById(id);
  const btn = input.nextElementSibling;
  if (input.type === 'password') {
    input.type = 'text';
    btn.querySelector('i').classList.remove('fa-eye');
    btn.querySelector('i').classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    btn.querySelector('i').classList.remove('fa-eye-slash');
    btn.querySelector('i').classList.add('fa-eye');
  }
}
</script>
</body>
</html>
