<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset OTP</title>
</head>
<body style="margin:0; padding:0; background:linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 100%); min-height:100vh; font-family:'Segoe UI', Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="min-height:100vh;">
    <tr>
      <td align="center" style="padding:40px 10px;">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:420px; background:#fff; border-radius:18px; box-shadow:0 4px 24px rgba(80,112,255,0.10); overflow:hidden;">
          <!-- Header -->
          <tr>
            <td align="center" style="padding:32px 24px 12px 24px; background:linear-gradient(90deg, #6366f1 0%, #60a5fa 100%);">
              <img src="https://img.icons8.com/ios-filled/50/ffffff/lock-2.png" alt="Lock Icon" width="40" style="display:block; margin-bottom:10px;">
              <h1 style="margin:0; color:#fff; font-size:1.6rem; font-weight:700; letter-spacing:1px;">ExpenseTracker</h1>
            </td>
          </tr>
          <!-- Title -->
          <tr>
            <td align="center" style="padding:24px 24px 0 24px;">
              <h2 style="margin:0; color:#374151; font-size:1.3rem; font-weight:600;">Password Reset Request</h2>
            </td>
          </tr>
          <!-- Message -->
          <tr>
            <td align="center" style="padding:18px 24px 0 24px; color:#4b5563; font-size:1rem;">
              <p style="margin:0 0 18px 0;">Use the OTP below to reset your password. This code will expire in <b>5 minutes</b>.</p>
            </td>
          </tr>
          <!-- OTP Box -->
          <tr>
            <td align="center" style="padding:0 24px 0 24px;">
              <div style="display:inline-block; background:linear-gradient(90deg, #6366f1 0%, #60a5fa 100%); color:#fff; font-size:2.2rem; font-weight:700; letter-spacing:12px; border-radius:12px; padding:18px 0; width:180px; margin:0 0 18px 0;">
                {{ otp }}
              </div>
            </td>
          </tr>
          <!-- CTA Button (optional) -->
          <tr>
            <td align="center" style="padding:0 24px 0 24px;">
              <a href="{{ reset_link }}" style="display:inline-block; background:linear-gradient(90deg, #6366f1 0%, #60a5fa 100%); color:#fff; text-decoration:none; font-weight:600; font-size:1rem; border-radius:8px; padding:12px 32px; margin-bottom:18px; margin-top:6px;">Reset Password</a>
            </td>
          </tr>
          <!-- Security Note -->
          <tr>
            <td align="center" style="padding:0 24px 0 24px;">
              <p style="margin:18px 0 0 0; color:#6b7280; font-size:0.97rem;">If you did not request a password reset, you can safely ignore this email.</p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding:32px 10px 18px 10px;">
              <p style="margin:0; color:#a1a1aa; font-size:0.93rem;">© 2026 ExpenseTracker. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
